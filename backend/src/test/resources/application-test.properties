spring.application.name=EmailNotificationSystem-Test

server.port=0

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Configure JPA for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable RabbitMQ for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Mock SendGrid
sendgrid.api.key=test-key
sendgrid.from-email=test@example.com
sendgrid.from-name=Test System

# RabbitMQ queues (not used in tests)
rabbitmq.exchange.email=email.exchange
rabbitmq.queue.email=email.queue
rabbitmq.queue.email-dlq=email.queue.dlq
rabbitmq.routing-key.email=email.routingKey
